name: Build Flarial

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run build script
        run: |
          cd ${{ github.workspace }}
          ./build.bat

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: Flarial-Build
          path: build/Release/Flarial.dll
          if-no-files-found: warn
